    <div id="register">
      <h2>Registrera konto</h2>
      <div id="errorAndForm">
        <ul id="regErrors"></ul>
        <p id="regOK"></p>
        <form method="post" id="registerForm">
          <label for="emailReg">E-postadress</label>
          <input type="text" id="emailReg">
          <br>
          <label for="passwordReg">Lösenord</label>
          <input type="text" id="passwordReg">
          <br>
          <button type="submit" id="registerButton">Registera konto</button>
        </form>
      </div>
    </div>
    <nav>
      <ul>
        <li>Sida för att logga in: <a href="login.html">Logga in</a></li>
      </ul>
    </nav>

  <footer>
